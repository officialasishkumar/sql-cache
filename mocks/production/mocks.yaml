# Production-Ready SQL Mocks (SQL Cache Format)
# =====================================================
# This file demonstrates the comprehensive mock format used by sql-cache.
# The format is designed to be optimized for production while
# being optimized for higher-level SQL interception.
#
# Key Matching Features:
# 1. Exact query string matching (highest priority)
# 2. AST structure-based matching using vitess sqlparser
# 3. Placeholder count verification for prepared statements
# 4. DML type checking (SELECT vs INSERT/UPDATE/DELETE)
# 5. Sequential replay support with consumption tracking
# 6. Type-flexible argument matching (int/int64/float64 interop)
#
# Usage:
#   cache.SetMode(sqlcache.ModeReplay)
#   rows, _ := cache.Query("SELECT * FROM users WHERE id = ?", 1)
#
# The matching algorithm will:
# 1. First try exact query + args match
# 2. Fall back to structural match (same AST structure)
# 3. Check placeholder count matches
# 4. Verify DML type compatibility
# 5. Score partial matches for best-effort

---
# Basic SELECT query - single row by ID
version: sql-cache/v1
kind: SQL
name: mock-select-user-by-id
spec:
    Metadata:
        recorded_at: "2026-02-28T15:00:00+05:30"
        operation: "query"
        description: "Fetch user by ID - demonstrates basic SELECT with single placeholder"
    Request:
        Query: SELECT id, name, email, created_at FROM users WHERE id = ?
        Args:
            - 1
        Type: SELECT
        Tables:
            - users
        Structure: "*sqlparser.Select->*sqlparser.AliasedTableExpr->sqlparser.TableName->*sqlparser.SelectExprs->*sqlparser.AliasedExpr->*sqlparser.ColName->*sqlparser.AliasedExpr->*sqlparser.ColName->*sqlparser.AliasedExpr->*sqlparser.ColName->*sqlparser.AliasedExpr->*sqlparser.ColName->*sqlparser.Where->*sqlparser.ComparisonExpr->*sqlparser.ColName->*sqlparser.Argument"
        PlaceholderCount: 1
        IsDML: true
        QueryHash: "a1b2c3d4e5f67890"
    Response:
        Columns:
            - id
            - name
            - email
            - created_at
        Rows:
            - - 1
              - "Alice"
              - "alice@example.com"
              - "2026-01-15T10:30:00Z"
        RowCount: 1
    Created: 1772272800
    ReqTimestampMock: 2026-02-28T15:00:00+05:30
    ResTimestampMock: 2026-02-28T15:00:00.1+05:30

